name: worker-deploy

on:
  push:
    branches: [main]
    paths:
      - "agi-temperature-worker/**"
      - ".github/workflows/worker-deploy.yml"

# Never cancel a prod deploy mid-migration.
concurrency:
  group: worker-prod-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agi-temperature-worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: agi-temperature-worker/package-lock.json

      - run: npm ci

      - name: Apply migrations to production D1
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: agi-temperature-worker
          command: d1 migrations apply agi-temperature --remote

      - name: Deploy production Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: agi-temperature-worker
          command: deploy

      - name: Smoke test production /api/health
        run: |
          URL="https://agi-temperature-worker.${{ secrets.CLOUDFLARE_WORKERS_SUBDOMAIN }}.workers.dev/api/health"
          STATUS=$(curl -sS -o /tmp/health.json -w "%{http_code}" --retry 5 --retry-all-errors --retry-delay 3 "$URL")
          cat /tmp/health.json
          test "$STATUS" = "200"
          jq -e '.status == "ok"' /tmp/health.json
