name: worker-ci

on:
  pull_request:
    paths:
      - "agi-temperature-worker/**"
      - ".github/workflows/worker-ci.yml"

defaults:
  run:
    working-directory: agi-temperature-worker

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: agi-temperature-worker/package-lock.json

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (Miniflare + Vitest)
        run: npm test
