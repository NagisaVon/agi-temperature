name: worker-preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "agi-temperature-worker/**"
      - ".github/workflows/worker-preview.yml"

# Shared preview D1 + single long-lived preview Worker: serialize PRs so
# their deploys + migrations don't race against each other.
concurrency:
  group: worker-preview-deploy
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agi-temperature-worker
    outputs:
      preview_url: ${{ steps.derive-url.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: agi-temperature-worker/package-lock.json

      - run: npm ci

      - name: Apply migrations to shared preview D1
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: agi-temperature-worker
          command: d1 migrations apply agi-temperature-preview --remote --env preview

      - name: Deploy preview Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: agi-temperature-worker
          command: deploy --env preview

      - name: Derive preview URL
        id: derive-url
        run: |
          echo "url=https://agi-temperature-worker-preview.${{ secrets.CLOUDFLARE_WORKERS_SUBDOMAIN }}.workers.dev" >> "$GITHUB_OUTPUT"

  smoke:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Hit /api/health
        run: |
          URL="${{ needs.deploy.outputs.preview_url }}/api/health"
          echo "GET $URL"
          STATUS=$(curl -sS -o /tmp/health.json -w "%{http_code}" --retry 5 --retry-all-errors --retry-delay 3 "$URL")
          echo "HTTP $STATUS"
          cat /tmp/health.json
          test "$STATUS" = "200"
          jq -e '.status == "ok"' /tmp/health.json

      - name: Hit /__scheduled
        run: |
          URL="${{ needs.deploy.outputs.preview_url }}/__scheduled?cron=*/5+*+*+*+*"
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" --retry 3 --retry-all-errors --retry-delay 3 "$URL")
          test "$STATUS" = "200"

  comment:
    needs: [deploy, smoke]
    if: always() && needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post preview URL on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: preview-worker
          message: |
            Preview Worker deployed: ${{ needs.deploy.outputs.preview_url }}
            Health: ${{ needs.deploy.outputs.preview_url }}/api/health
            Smoke test: **${{ needs.smoke.result }}**
